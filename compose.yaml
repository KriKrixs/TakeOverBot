services:
  takeoverbot:
    image: takeoverbot
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - takeoverbot-common
  browser:
    image: mcr.microsoft.com/playwright:v1.58.0-noble
    command: npx playwright@1.58.0 run-server --port 8080 --host 0.0.0.0
    ports:
      - "8080:8080"
    networks:
      - takeoverbot-common

networks:
  takeoverbot-common: